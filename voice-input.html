<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Voice - Claude</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f0f;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:'Segoe UI',sans-serif}
.ring{width:70px;height:70px;border-radius:50%;background:#1a1a1a;border:2px solid #2a2a2a;display:flex;align-items:center;justify-content:center;margin-bottom:14px;transition:all .3s}
.ring.listening{border-color:#818cf8;background:#1a1a2e;animation:pulse 1.4s ease-in-out infinite}
.ring.ok{border-color:#4ade80;background:#0f2a1a}
.ring.error{border-color:#f87171;background:#2a0f0f}
.ring.paused{border-color:#f59e0b;background:#1a1500}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(129,140,248,.5)}50%{box-shadow:0 0 0 16px rgba(129,140,248,0)}}
.listening svg{fill:#818cf8}.ok svg{fill:#4ade80}.error svg{fill:#f87171}.paused svg{fill:#f59e0b}
#st{font-size:13px;color:#555;text-align:center;max-width:220px;min-height:18px;transition:color .3s}
#st.listening{color:#818cf8}#st.ok{color:#4ade80}#st.error{color:#f87171}#st.paused{color:#f59e0b}
#interim{font-size:12px;color:#444;max-width:240px;text-align:center;margin-top:8px;font-style:italic;min-height:16px}
#pauseBtn{margin-top:14px;padding:5px 16px;background:#1a1a1a;border:1px solid #333;color:#666;border-radius:20px;font-size:11px;cursor:pointer;transition:all .2s}
#pauseBtn:hover{border-color:#555;color:#aaa}
#pauseBtn.active{border-color:#f59e0b;color:#f59e0b;background:#1a1500}
</style>
</head>
<body>
<div class="ring" id="ring">
<svg width="30" height="30" viewBox="0 0 24 24" fill="#333">
<path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v6a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zm7 8a1 1 0 0 1 1 1 8 8 0 0 1-7 7.938V21h2a1 1 0 0 1 0 2H9a1 1 0 0 1 0-2h2v-1.062A8 8 0 0 1 4 12a1 1 0 0 1 2 0 6 6 0 0 0 12 0 1 1 0 0 1 1-1z"/>
</svg>
</div>
<div id="st">Запуск...</div>
<div id="interim"></div>
<button id="pauseBtn" onclick="togglePause()">⏸ Пауза</button>
<script>
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const ring=document.getElementById('ring');
const st=document.getElementById('st');
const interim=document.getElementById('interim');
const pauseBtn=document.getElementById('pauseBtn');
let paused=false;
function setState(s,m){ring.className='ring '+s;st.className=s;st.textContent=m}
function togglePause(){
  paused=!paused;
  if(paused){
    pauseBtn.textContent='▶ Продолжить';
    pauseBtn.classList.add('active');
    if(rec){try{rec.stop()}catch(e){}}
    setState('paused','Пауза');
    interim.textContent='';
  } else {
    pauseBtn.textContent='⏸ Пауза';
    pauseBtn.classList.remove('active');
    restarting=false;
    start();
  }
}
if(!SR){setState('error','Нужен Chrome')}
else{
let rec,restarting=false;
function start(){
if(restarting||paused)return;
restarting=true;
rec=new SR();
rec.lang='ru-RU';
rec.interimResults=true;
rec.continuous=false;
rec.onstart=()=>{restarting=false;interim.textContent='';setState('listening','Говорите...')};
rec.onresult=e=>{
let fin='',tmp='';
for(let i=e.resultIndex;i<e.results.length;i++){
if(e.results[i].isFinal)fin+=e.results[i][0].transcript;
else tmp=e.results[i][0].transcript;
}
interim.textContent=tmp;
if(fin){
const text=fin.trim();
interim.textContent=text;
setState('ok','Отправляю...');
fetch('/voice?text='+encodeURIComponent(text))
.then(()=>{setTimeout(()=>{interim.textContent='';setState('listening','Говорите...')},2000)})
.catch(()=>{setState('error','Переподключение...');setTimeout(()=>location.reload(),2000);});
}
};
rec.onend=()=>{if(!paused)setTimeout(()=>{restarting=false;start()},300)};
rec.onerror=e=>{
restarting=false;
if(e.error==='not-allowed'){setState('error','Разрешите микрофон!');return}
setTimeout(()=>start(),1500);
};
try{rec.start()}catch(e){restarting=false;setTimeout(()=>start(),1000)}
}
setTimeout(()=>start(),500);
}
</script>
</body>
</html>
