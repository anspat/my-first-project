<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Спатарь Андрей</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:   #c9a84c;
    --gold2:  #f0d080;
    --accent: #e8b84b;
    --glow:   rgba(201,168,76,.35);
  }

  body {
    min-height: 100vh;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
  }

  /* ── ambient background ── */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(201,168,76,.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 80%, rgba(201,168,76,.04) 0%, transparent 60%);
  }

  /* floating particles */
  .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .p {
    position: absolute;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0;
    animation: float linear infinite;
  }

  @keyframes float {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: .4; }
    90%  { opacity: .15; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* ── card ── */
  .card {
    position: relative; z-index: 1;
    width: min(420px, 92vw);
    padding: 52px 40px 44px;
    border-radius: 24px;
    background: linear-gradient(145deg, #141414 0%, #0e0e0e 100%);
    border: 1px solid rgba(201,168,76,.18);
    box-shadow:
      0 0 0 1px rgba(201,168,76,.06),
      0 24px 60px rgba(0,0,0,.7),
      0 0 80px rgba(201,168,76,.05);
    text-align: center;
    animation: cardIn .7s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* top line decoration */
  .card::before {
    content: '';
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 60%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* ── avatar ring ── */
  .avatar-wrap {
    width: 90px; height: 90px;
    margin: 0 auto 28px;
    position: relative;
  }
  .avatar-ring {
    position: absolute; inset: -4px;
    border-radius: 50%;
    background: conic-gradient(var(--gold), var(--gold2), var(--gold));
    animation: spin 6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .avatar-inner {
    position: absolute; inset: 3px;
    border-radius: 50%;
    background: #111;
    overflow: hidden;
  }
  .avatar-inner img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
    display: block;
  }

  /* ── name ── */
  .name {
    font-size: clamp(22px, 6vw, 30px);
    font-weight: 800;
    letter-spacing: .5px;
    line-height: 1.15;
    background: linear-gradient(270deg, #a855f7, #3b82f6, #818cf8, #c084fc, #60a5fa, #a855f7);
    background-size: 300% 300%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: nameShimmer 4s ease infinite, glow 3s ease-in-out infinite alternate;
    margin-bottom: 6px;
  }
  @keyframes nameShimmer {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes glow {
    from { filter: drop-shadow(0 0 10px rgba(139,92,246,.4)); }
    to   { filter: drop-shadow(0 0 26px rgba(99,102,241,.8)); }
  }

  /* ── divider ── */
  .divider {
    width: 40px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 16px auto;
    border-radius: 2px;
  }

  /* ── specialization ── */
  .spec {
    font-size: 13px;
    line-height: 1.6;
    color: rgba(255,255,255,.55);
    max-width: 300px;
    margin: 0 auto 28px;
    letter-spacing: .2px;
  }
  .spec strong {
    color: rgba(255,255,255,.8);
    font-weight: 500;
  }

  /* ── social icons ── */
  .socials {
    display: flex;
    gap: 14px;
    justify-content: center;
    margin-bottom: 32px;
  }

  .social-btn {
    width: 48px; height: 48px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.08);
    background: rgba(255,255,255,.04);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    text-decoration: none;
    position: relative;
    transition: transform .25s, border-color .25s, background .25s, box-shadow .25s;
    overflow: hidden;
  }
  .social-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--gradient, linear-gradient(135deg, var(--gold), var(--gold2)));
    opacity: 0;
    transition: opacity .25s;
    border-radius: inherit;
  }
  .social-btn:hover {
    transform: translateY(-4px) scale(1.08);
    border-color: transparent;
    box-shadow: 0 8px 24px var(--glow-clr, var(--glow));
  }
  .social-btn:hover::before { opacity: 1; }
  .social-btn svg {
    position: relative; z-index: 1;
    transition: fill .25s;
  }
  .social-btn:hover svg { fill: #0a0a0a; }

  .social-btn.tg   { --gradient: linear-gradient(135deg,#2aabee,#229ed9); --glow-clr: rgba(42,171,238,.4); }
  .social-btn.wa   { --gradient: linear-gradient(135deg,#25d366,#128c7e); --glow-clr: rgba(37,211,102,.4); }
  .social-btn.inst { --gradient: linear-gradient(135deg,#fd5949,#d6249f,#285aeb); --glow-clr: rgba(214,36,159,.4); }
  .social-btn.vk   { --gradient: linear-gradient(135deg,#4a76a8,#2787f5); --glow-clr: rgba(39,135,245,.4); }

  /* ── CTA button ── */
  .cta {
    display: inline-flex;
    align-items: center; gap: 10px;
    padding: 14px 32px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: .3px;
    color: #0a0a0a;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
    box-shadow: 0 4px 20px rgba(201,168,76,.3);
    position: relative;
    overflow: hidden;
    transition: transform .2s, box-shadow .2s;
    text-decoration: none;
  }
  .cta::after {
    content: '';
    position: absolute; top: 50%; left: 50%;
    width: 0; height: 0;
    background: rgba(255,255,255,.25);
    border-radius: 50%;
    transform: translate(-50%,-50%);
    transition: width .5s, height .5s, opacity .5s;
    opacity: 0;
  }
  .cta:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 8px 32px rgba(201,168,76,.5);
  }
  .cta:active::after { width: 200px; height: 200px; opacity: 0; }
  .cta:active { transform: scale(.98); }

  .pulse-ring {
    position: absolute; inset: 0;
    border-radius: inherit;
    border: 2px solid var(--gold);
    animation: pulse-out 2.5s ease-out infinite;
  }
  @keyframes pulse-out {
    0%   { transform: scale(1);    opacity: .6; }
    100% { transform: scale(1.25); opacity: 0; }
  }

  /* ── footer tag ── */
  .tag {
    margin-top: 28px;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,.15);
  }

  /* ── responsive ── */
  @media (max-width: 400px) {
    .card { padding: 40px 24px 36px; }
  }
</style>
</head>

<script>
  // generate particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'p';
    const size = Math.random() * 3 + 1;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      animation-duration:${Math.random()*12+8}s;
      animation-delay:${Math.random()*10}s;
    `;
    container.appendChild(p);
  }

  // ripple on CTA click
  document.querySelector('.cta').addEventListener('click', function(e) {
    const r = document.createElement('span');
    r.style.cssText = `
      position:absolute;border-radius:50%;
      width:4px;height:4px;
      background:rgba(255,255,255,.5);
      top:${e.offsetY}px;left:${e.offsetX}px;
      transform:translate(-50%,-50%) scale(0);
      animation:ripple .6s ease-out forwards;
      pointer-events:none;
    `;
    this.appendChild(r);
    setTimeout(()=>r.remove(), 700);
  });

  const style = document.createElement('style');
  style.textContent = `
    @keyframes ripple {
      to { transform:translate(-50%,-50%) scale(60); opacity:0; }
    }
  `;
  document.head.appendChild(style);
</script>

</html>
